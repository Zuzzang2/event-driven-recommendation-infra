apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-secret
  namespace: edr
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: SecretStore
  target:
    name: supabase-secret      # 앱이 참조하는 Secret 이름 (기존과 동일)
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /edr/supabase/database_url   # SSM SecureString 파라미터
