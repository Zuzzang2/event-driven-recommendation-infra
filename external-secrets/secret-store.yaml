apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-ssm
  namespace: edr
spec:
  provider:
    aws:
      service: ParameterStore
      region: ap-northeast-2
      # auth 생략 → ESO 컨트롤러가 EC2 인스턴스 역할(IMDS) 자격증명을 사용
      # (terraform: aws-ec2 모듈의 instance profile + IMDSv2 hop limit 2)
